<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TFP Nutrition">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>TFP Nutrition</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#000; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
.logo-top { color:#972573; font-size:12px; font-weight:700; letter-spacing:3px; }
.logo-bot { font-family:Georgia,serif; font-size:32px; font-style:italic; margin-top:-2px; }
.steps { margin-top:30px; text-align:left; max-width:280px; }
.step { display:flex; align-items:flex-start; margin-bottom:16px; color:#ccc; font-size:15px; line-height:1.4; }
.num { background:#D900BC; color:#fff; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; margin-right:12px; flex-shrink:0; }
.open-btn { display:inline-block; margin-top:30px; padding:14px 40px; background:#D900BC; color:#fff; font-size:16px; font-weight:700; border:none; border-radius:12px; text-decoration:none; cursor:pointer; }
.open-btn:active { background:#972573; }
@media (display-mode: standalone) { .save-instructions { display:none; } }
</style>
</head>
<body>
<script>if(window.navigator.standalone||window.matchMedia("(display-mode:standalone)").matches){window.location.replace("https://script.google.com/macros/s/AKfycbwQrE1nSPAysT-TLypITs8kZLZ25_8kRIdAGwxGfzzaCDsTZYXOVyGJh0d3oWnmSfwe1g/exec");}</script>
<div class="logo-top">THE FIT</div>
<div class="logo-bot">Physician</div>
<div class="save-instructions">
<div class="steps">
<div class="step"><span class="num">1</span> Tap the <strong>&nbsp;Share&nbsp;</strong> button below</div>
<div class="step"><span class="num">2</span> Tap <strong>&nbsp;Add to Home Screen</strong></div>
<div class="step"><span class="num">3</span> Open the app from your home screen</div>
</div>
</div>
<button class="open-btn" onclick="window.location.href='https://script.google.com/macros/s/AKfycbwQrE1nSPAysT-TLypITs8kZLZ25_8kRIdAGwxGfzzaCDsTZYXOVyGJh0d3oWnmSfwe1g/exec';">Open Nutrition Tracker</button>
</body>
</html>
