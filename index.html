<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TFP Nutrition">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>TFP Nutrition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .logo-top { color: #972573; font-size: 12px; font-weight: 700; letter-spacing: 3px; }
    .logo-bot { font-family: Georgia, serif; font-size: 28px; font-style: italic; margin-top: -2px; }
    .open-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 40px;
      background: #D900BC;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .open-btn:active { background: #972573; }
    .hint {
      margin-top: 24px;
      color: #888;
      font-size: 13px;
      line-height: 1.5;
      max-width: 280px;
    }
    .hint strong { color: #bbb; }
    .error { color: #FF5722; margin-top: 20px; display: none; text-align: center; }
    .loading-text { color: #888; font-size: 14px; margin-top: 20px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #333; border-top: 3px solid #D900BC;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #launch-screen { display: none; }
    #home-screen { display: none; }
  </style>
</head>
<body>
  <!-- Shown when opened from home screen — auto-redirects -->
  <div id="launch-screen">
    <div class="logo-top">THE FIT</div>
    <div class="logo-bot">Physician</div>
    <div class="loading-text">Opening your tracker...</div>
    <div class="spinner"></div>
  </div>

  <!-- Shown when opened in browser — lets user add to home screen -->
  <div id="home-screen">
    <div class="logo-top">THE FIT</div>
    <div class="logo-bot">Physician</div>
    <a class="open-btn" id="openBtn">Open Nutrition Tracker</a>
    <div class="hint">
      <strong>Tip:</strong> Add this page to your home screen for quick access with the app icon.
    </div>
  </div>

  <!-- No URL provided -->
  <div class="error" id="error">
    <p>Could not find your tracker link.</p>
    <p style="margin-top:8px;font-size:13px;color:#888;">Contact your coach for the correct link.</p>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var target = params.get('url');

      // If we have a URL in the query string, save it for home screen use
      if (target) {
        try { localStorage.setItem('tfp_tracker_url', target); } catch(e) {}
      } else {
        // No query param — try to load from localStorage (home screen launch)
        try { target = localStorage.getItem('tfp_tracker_url'); } catch(e) {}
      }

      if (!target) {
        document.getElementById('error').style.display = 'block';
        return;
      }

      // Check if running as installed home screen app (standalone mode)
      var isStandalone = window.navigator.standalone === true
        || window.matchMedia('(display-mode: standalone)').matches;

      if (isStandalone) {
        // Opened from home screen — show loading then redirect
        document.getElementById('launch-screen').style.display = 'block';
        setTimeout(function() {
          window.location.href = target;
        }, 600);
      } else {
        // Opened in browser — show landing page with open button
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('openBtn').href = target;
      }
    })();
  </script>
</body>
</html>
