<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TFP Nutrition">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>TFP Nutrition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    .loading {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .logo-top { color: #972573; font-size: 12px; font-weight: 700; letter-spacing: 3px; }
    .logo-bot { font-family: Georgia, serif; font-size: 28px; font-style: italic; margin-top: -2px; }
    .loading-text { color: #888; font-size: 14px; margin-top: 20px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #333; border-top: 3px solid #D900BC;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #FF5722; margin-top: 20px; display: none; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="logo-top">THE FIT</div>
    <div class="logo-bot">Physician</div>
    <div class="loading-text">Loading your nutrition tracker...</div>
    <div class="spinner"></div>
  </div>
  <div class="error" id="error">
    <p>Could not find your tracker link.</p>
    <p style="margin-top:8px;font-size:13px;color:#888;">Contact your coach for the correct link.</p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var target = params.get('url');

      if (target) {
        // Load the tracker inside an iframe so the browser stays on this URL
        // This preserves the home screen icon and app name
        var iframe = document.createElement('iframe');
        iframe.src = target;
        iframe.allow = 'camera *; microphone *';
        iframe.setAttribute('allowfullscreen', '');
        document.body.appendChild(iframe);

        // Hide the loading screen once iframe loads
        iframe.onload = function() {
          document.getElementById('loading').classList.add('hidden');
        };
        // Fallback: hide loading after 4 seconds regardless
        setTimeout(function() {
          document.getElementById('loading').classList.add('hidden');
        }, 4000);
      } else {
        // No URL provided — show error
        document.querySelector('.loading-text').style.display = 'none';
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
